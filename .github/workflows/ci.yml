name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    if: vars.ENABLE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend and copy to Spring static
        working-directory: frontend
        run: npm run build:deploy

      - name: Build Spring Boot JAR
        run: bash mvnw -B -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: timecheck-jar
          path: target/ROOT.jar
          retention-days: 7

  deploy:
    needs: build
    if: vars.ENABLE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: timecheck-jar
          path: target

      - name: Deploy JAR via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: target/ROOT.jar
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Restart application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cp "${{ secrets.DEPLOY_PATH }}/target/ROOT.jar" "${{ secrets.DEPLOY_PATH }}/ROOT.jar"
            sudo systemctl restart timecheck
